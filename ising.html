<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ising Model Simulation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f8;
      --surface: #fff;
      --accent: #0284c7;
      --accent-dark: #0369a1;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
      max-width: 600px;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 8px;
    }

    header p {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.5;
    }

    header p .eq {
      font-family: 'Georgia', serif;
      font-style: italic;
    }

    /* Page layout: charts panel + sim side by side */
    .page-layout {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      width: 100%;
      max-width: 900px;
    }

    /* Charts panel */
    .charts-panel {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-top: 4px;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .chart-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .chart-card canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 4px;
      image-rendering: auto;
    }

    /* Simulation container */
    .sim-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      width: 100%;
      max-width: 580px;
    }

    #canvas {
      display: block;
      width: 500px;
      height: 500px;
      image-rendering: pixelated;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .controls {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .control-row label {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      width: 110px;
      flex-shrink: 0;
    }

    .control-row input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
      height: 4px;
      cursor: pointer;
    }

    .control-row .val {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
      width: 54px;
      text-align: right;
      flex-shrink: 0;
    }

    .control-row select {
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
    }

    .buttons {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    button {
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      padding: 8px 20px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }

    #btn-toggle {
      background: var(--accent);
      color: #fff;
    }

    #btn-toggle:hover { background: var(--accent-dark); }
    #btn-toggle.paused { background: #16a34a; }
    #btn-toggle.paused:hover { background: #15803d; }

    #btn-reset {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    #btn-reset:hover { background: var(--border); }

    #btn-tc {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    #btn-tc:hover { background: var(--border); }

    .step-btn {
      width: 22px;
      height: 22px;
      padding: 0;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: 500;
      line-height: 20px;
      text-align: center;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      flex-shrink: 0;
    }

    .step-btn:hover { background: var(--border); color: var(--text); }

    .stats {
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      gap: 20px;
      padding-top: 4px;
      border-top: 1px solid var(--border);
      width: 100%;
    }

    .stats span strong {
      color: var(--text);
      font-weight: 500;
    }

    footer {
      margin-top: 32px;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    /* Stack vertically on narrow screens */
    @media (max-width: 820px) {
      .page-layout {
        flex-direction: column;
        align-items: center;
      }
      .charts-panel {
        width: 100%;
        max-width: 540px;
        flex-direction: row;
        flex-wrap: wrap;
      }
      .chart-card {
        flex: 1;
        min-width: 140px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>2D Ising Model</h1>
  <p>
    Metropolis Monte Carlo simulation on a square lattice.<br>
    <span class="eq">H = &minus;J &Sigma; s<sub>i</sub>s<sub>j</sub> &minus; h &Sigma; s<sub>i</sub></span>,
    with J = 1 and periodic boundary conditions.
    Critical temperature T<sub>c</sub> &asymp; 2.269.
  </p>
</header>

<!-- page-layout commented out with charts panel — re-enable together
<div class="page-layout">
-->

  <!-- charts-panel commented out — re-enable when revisiting
  <div class="charts-panel">
    <div class="chart-card">
      <div class="chart-label">|Magnetization|</div>
      <canvas id="chart-mag" width="236" height="100"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-label">Susceptibility &chi;</div>
      <canvas id="chart-chi" width="236" height="100"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-label">Energy / spin</div>
      <canvas id="chart-e" width="236" height="100"></canvas>
    </div>
  </div>
  -->

  <div class="sim-container">
    <canvas id="canvas"></canvas>

    <div class="controls">
      <div class="control-row">
        <label>Grid size</label>
        <select id="sel-size">
          <option value="100">100 &times; 100</option>
          <option value="250" selected>250 &times; 250</option>
          <option value="500">500 &times; 500</option>
        </select>
      </div>

      <div class="control-row">
        <label>Temperature T</label>
        <button class="step-btn" id="btn-temp-dn">&minus;</button>
        <input type="range" id="sl-temp" min="0.1" max="5.0" step="0.05" value="1.0">
        <button class="step-btn" id="btn-temp-up">+</button>
        <span class="val" id="lbl-temp">1.00</span>
      </div>

      <div class="control-row">
        <label>Field h</label>
        <button class="step-btn" id="btn-field-dn">&minus;</button>
        <input type="range" id="sl-field" min="-1.0" max="1.0" step="0.1" value="0.0">
        <button class="step-btn" id="btn-field-up">+</button>
        <span class="val" id="lbl-field">0.00</span>
      </div>

      <div class="control-row">
        <label>Steps / frame</label>
        <button class="step-btn" id="btn-steps-dn">&minus;</button>
        <input type="range" id="sl-steps" min="1" max="20000" step="1" value="10000">
        <button class="step-btn" id="btn-steps-up">+</button>
        <span class="val" id="lbl-steps">10,000</span>
      </div>

      <div class="buttons">
        <button id="btn-toggle">Pause</button>
        <button id="btn-reset">Reset</button>
        <button id="btn-tc">T<sub>c</sub></button>
      </div>
    </div>

    <div class="stats">
      <span>T: <strong id="stat-T">1.00</strong></span>
      <span>h: <strong id="stat-h">0.00</strong></span>
      <span>Magnetization: <strong id="stat-mag">0.00</strong></span>
      <span>Steps/sec: <strong id="stat-sps">--</strong></span>
    </div>
  </div>

<!-- closing page-layout div commented out — re-enable with charts panel
</div>
-->

<footer>
  <a href="/">← Back to site</a>
</footer>

<script>
  // --- State ---
  let N = 250;
  let T = 1.0;
  let h = 0.0;
  let stepsPerFrame = 10000;
  let running = true;
  let spins = null;
  let animId = null;

  // --- Chart buffers ---
  const HIST = 600;
  const bufM   = new Float32Array(HIST);
  const bufChi = new Float32Array(HIST);
  const bufE   = new Float32Array(HIST);
  let bufHead = 0, bufCount = 0;

  // Rolling window for χ = N²·Var(|M|)/T
  const CHI_WIN = 100;
  const mWindow = new Float32Array(CHI_WIN);
  let mWinHead = 0, mWinCount = 0;

  // --- Performance tracking ---
  let lastFrameTime = performance.now();
  let stepAccum = 0;
  let lastSpsUpdate = performance.now();

  // --- Canvas setup ---
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  // --- Chart canvas contexts (commented out with charts panel) ---
  // const ctxMag = document.getElementById('chart-mag').getContext('2d');
  // const ctxChi = document.getElementById('chart-chi').getContext('2d');
  // const ctxE   = document.getElementById('chart-e').getContext('2d');

  function setCanvasSize(n) {
    canvas.width = n;
    canvas.height = n;
  }

  // --- Init grid ---
  function initGrid(n) {
    const arr = new Int8Array(n * n);
    for (let i = 0; i < arr.length; i++) {
      arr[i] = Math.random() < 0.5 ? 1 : -1;
    }
    return arr;
  }

  // --- Metropolis step ---
  function step() {
    const n = N;
    const n2 = n * n;
    const invT = 1.0 / T;
    const s = spins;

    for (let iter = 0; iter < stepsPerFrame; iter++) {
      const idx = (Math.random() * n2) | 0;
      const row = (idx / n) | 0;
      const col = idx % n;

      const spin = s[idx];

      // Periodic neighbors
      const up    = s[((row - 1 + n) % n) * n + col];
      const down  = s[((row + 1)     % n) * n + col];
      const left  = s[row * n + (col - 1 + n) % n];
      const right = s[row * n + (col + 1)     % n];

      const sumN = up + down + left + right;
      const dE = 2.0 * spin * (sumN + h);

      if (dE <= 0 || Math.random() < Math.exp(-dE * invT)) {
        s[idx] = -spin;
      }
    }
  }

  // --- Render ---
  const spinUpR = 253, spinUpG = 231, spinUpB = 37;   // #FDE725 cividis gold
  const spinDnR = 68,  spinDnG = 1,   spinDnB = 84;   // #440154 cividis purple

  function render() {
    const n = N;
    const imageData = ctx.createImageData(n, n);
    const data = imageData.data;
    const s = spins;

    for (let i = 0; i < n * n; i++) {
      const base = i * 4;
      if (s[i] === 1) {
        data[base]     = spinUpR;
        data[base + 1] = spinUpG;
        data[base + 2] = spinUpB;
      } else {
        data[base]     = spinDnR;
        data[base + 1] = spinDnG;
        data[base + 2] = spinDnB;
      }
      data[base + 3] = 255;
    }

    ctx.putImageData(imageData, 0, 0);
  }

  // --- Magnetization ---
  function magnetization() {
    let sum = 0;
    for (let i = 0; i < spins.length; i++) sum += spins[i];
    return sum / spins.length;
  }

  // --- Energy per spin ---
  // Counts each bond once (right + down), so no divide-by-2 needed.
  function energyPerSpin() {
    const n = N, s = spins;
    let sum = 0;
    for (let row = 0; row < n; row++) {
      for (let col = 0; col < n; col++) {
        const si = s[row * n + col];
        const right = s[row * n + (col + 1) % n];
        const down  = s[((row + 1) % n) * n + col];
        sum += si * (right + down);
      }
    }
    return -sum / (N * N) - h * magnetization();
  }

  // --- Susceptibility (rolling variance of |M|) ---
  function pushMWindow(absMag) {
    mWindow[mWinHead] = absMag;
    mWinHead = (mWinHead + 1) % CHI_WIN;
    if (mWinCount < CHI_WIN) mWinCount++;
  }

  function susceptibility() {
    if (mWinCount < 2) return 0;
    let sum = 0, sum2 = 0;
    for (let i = 0; i < mWinCount; i++) {
      const v = mWindow[(mWinHead - mWinCount + i + CHI_WIN) % CHI_WIN];
      sum += v; sum2 += v * v;
    }
    const mean = sum / mWinCount;
    return (N * N / T) * (sum2 / mWinCount - mean * mean);
  }

  // --- Chart draw (pure canvas 2D, no library) ---
  function drawChart(ctx, buf, color, fmt) {
    const W = ctx.canvas.width, H = ctx.canvas.height;
    ctx.clearRect(0, 0, W, H);
    if (bufCount < 2) return;

    // Find y range
    let yMin = Infinity, yMax = -Infinity;
    for (let i = 0; i < bufCount; i++) {
      const v = buf[(bufHead - bufCount + i + HIST) % HIST];
      if (v < yMin) yMin = v;
      if (v > yMax) yMax = v;
    }
    if (yMin === yMax) { yMin -= 0.05; yMax += 0.05; }
    const pad = (yMax - yMin) * 0.1;
    yMin -= pad; yMax += pad;

    // Line
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.lineJoin = 'round';
    for (let i = 0; i < bufCount; i++) {
      const v = buf[(bufHead - bufCount + i + HIST) % HIST];
      const x = (i / (HIST - 1)) * W;
      const y = H - ((v - yMin) / (yMax - yMin)) * H;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Current value (top-right)
    const cur = buf[(bufHead - 1 + HIST) % HIST];
    ctx.fillStyle = color;
    ctx.font = 'bold 10px Inter, sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    ctx.fillText(fmt(cur), W - 3, 3);

    // y-range labels
    ctx.fillStyle = '#94a3b8';
    ctx.font = '9px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(fmt(yMax), 3, 3);
    ctx.textBaseline = 'bottom';
    ctx.fillText(fmt(yMin), 3, H - 1);
  }

  // --- Stats update ---
  function updateStats() {
    const now = performance.now();
    const elapsed = now - lastSpsUpdate;
    if (elapsed > 500) {
      const sps = (stepAccum / elapsed * 1000) | 0;
      document.getElementById('stat-sps').textContent = sps.toLocaleString();
      stepAccum = 0;
      lastSpsUpdate = now;
    }
    document.getElementById('stat-T').textContent = T.toFixed(2);
    document.getElementById('stat-h').textContent = h.toFixed(2);
    document.getElementById('stat-mag').textContent = magnetization().toFixed(3);
  }

  // --- Animation loop ---
  function animate() {
    if (!running) return;
    step();
    render();
    stepAccum += stepsPerFrame;

    // Chart data collection + drawing commented out with charts panel
    // const absMag = Math.abs(magnetization());
    // pushMWindow(absMag);
    // bufM[bufHead]   = absMag;
    // bufChi[bufHead] = susceptibility();
    // bufE[bufHead]   = energyPerSpin();
    // bufHead = (bufHead + 1) % HIST;
    // if (bufCount < HIST) bufCount++;
    // drawChart(ctxMag, bufM, '#0284c7', v => v.toFixed(3));
    // drawChart(ctxChi, bufChi, '#d97706', v => v.toFixed(1));
    // drawChart(ctxE,   bufE,   '#16a34a', v => v.toFixed(3));

    updateStats();
    animId = requestAnimationFrame(animate);
  }

  // --- Initialize ---
  function init() {
    setCanvasSize(N);
    spins = initGrid(N);
    render();
    stepAccum = 0;
    lastSpsUpdate = performance.now();
  }

  // --- Controls ---
  const btnToggle = document.getElementById('btn-toggle');
  const btnReset  = document.getElementById('btn-reset');
  const btnTc     = document.getElementById('btn-tc');

  btnToggle.addEventListener('click', () => {
    running = !running;
    if (running) {
      btnToggle.textContent = 'Pause';
      btnToggle.classList.remove('paused');
      animate();
    } else {
      btnToggle.textContent = 'Resume';
      btnToggle.classList.add('paused');
      if (animId) cancelAnimationFrame(animId);
    }
  });

  btnReset.addEventListener('click', () => {
    N = 250; T = 1.0; h = 0.0; stepsPerFrame = 10000;
    document.getElementById('sel-size').value = 250;
    const slTemp  = document.getElementById('sl-temp');
    const slField = document.getElementById('sl-field');
    const slSteps = document.getElementById('sl-steps');
    slTemp.value  = T;             document.getElementById('lbl-temp').textContent  = T.toFixed(2);
    slField.value = h;             document.getElementById('lbl-field').textContent = h.toFixed(2);
    slSteps.value = stepsPerFrame; document.getElementById('lbl-steps').textContent = stepsPerFrame.toLocaleString();

    bufHead = 0; bufCount = 0;
    mWinHead = 0; mWinCount = 0;

    if (animId) cancelAnimationFrame(animId);
    init();
    if (running) animate();
  });

  btnTc.addEventListener('click', () => {
    T = 2.269;
    const slTemp = document.getElementById('sl-temp');
    slTemp.value = T;
    document.getElementById('lbl-temp').textContent = T.toFixed(2);
    document.getElementById('stat-T').textContent = T.toFixed(2);
  });

  document.getElementById('sel-size').addEventListener('change', function() {
    N = parseInt(this.value);
    if (animId) cancelAnimationFrame(animId);
    init();
    if (running) animate();
  });

  document.getElementById('sl-temp').addEventListener('input', function() {
    T = parseFloat(this.value);
    document.getElementById('lbl-temp').textContent = T.toFixed(2);
    document.getElementById('stat-T').textContent = T.toFixed(2);
    mWinHead = 0; mWinCount = 0;
  });

  document.getElementById('sl-field').addEventListener('input', function() {
    h = parseFloat(this.value);
    document.getElementById('lbl-field').textContent = h.toFixed(2);
    document.getElementById('stat-h').textContent = h.toFixed(2);
  });

  document.getElementById('sl-steps').addEventListener('input', function() {
    stepsPerFrame = parseInt(this.value);
    document.getElementById('lbl-steps').textContent = stepsPerFrame.toLocaleString();
  });

  // --- +/- step buttons ---
  function makeNudge(sliderId, lblId, delta, decimals, onUpdate) {
    const sl = document.getElementById(sliderId);
    const lbl = document.getElementById(lblId);
    return () => {
      const min = parseFloat(sl.min), max = parseFloat(sl.max);
      const val = Math.min(max, Math.max(min, parseFloat(sl.value) + delta));
      sl.value = val;
      lbl.textContent = decimals > 0 ? val.toFixed(decimals) : val.toLocaleString();
      onUpdate(val);
    };
  }

  document.getElementById('btn-temp-dn').addEventListener('click',
    makeNudge('sl-temp', 'lbl-temp', -0.05, 2, v => {
      T = v;
      document.getElementById('stat-T').textContent = v.toFixed(2);
      mWinHead = 0; mWinCount = 0;
    }));
  document.getElementById('btn-temp-up').addEventListener('click',
    makeNudge('sl-temp', 'lbl-temp', +0.05, 2, v => {
      T = v;
      document.getElementById('stat-T').textContent = v.toFixed(2);
      mWinHead = 0; mWinCount = 0;
    }));

  document.getElementById('btn-field-dn').addEventListener('click',
    makeNudge('sl-field', 'lbl-field', -0.1, 2, v => { h = v; document.getElementById('stat-h').textContent = v.toFixed(2); }));
  document.getElementById('btn-field-up').addEventListener('click',
    makeNudge('sl-field', 'lbl-field', +0.1, 2, v => { h = v; document.getElementById('stat-h').textContent = v.toFixed(2); }));

  document.getElementById('btn-steps-dn').addEventListener('click',
    makeNudge('sl-steps', 'lbl-steps', -500, 0, v => { stepsPerFrame = Math.round(v); }));
  document.getElementById('btn-steps-up').addEventListener('click',
    makeNudge('sl-steps', 'lbl-steps', +500, 0, v => { stepsPerFrame = Math.round(v); }));

  // --- Start ---
  init();
  animate();
</script>
</body>
</html>
